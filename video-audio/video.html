<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Audio Example</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/2.9.3/Chart.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery.min.js/3.5.1/jquery.min.js"></script>
</head>
<body>
    <video poster="assets/img/waterfall.png" controls="controls" width="600" height="500">
        <source width="600" height="500" src="assets/img/hudson-shelter-falls.mp4" type="video/mp4" />
        <source width="600" height="500" src="assets/img/hudson-shelter-falls.ogv" type="video/ogg" />
        <source width="600" height="500" src="assets/img/hudson-shelter-falls.webm" type="video/webm" />

    </video>
</body>
</html>
